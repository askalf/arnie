name: Auto-release

# Triggered when package.json's "version" field changes on master.
# Tags vX.Y.Z, creates a GitHub release from the matching CHANGELOG
# section, and runs `npm publish --provenance --access public`.
#
# Idempotent — if the tag already exists the job exits cleanly without
# republishing, so manual re-runs of the workflow are safe.

on:
  push:
    branches: [master]
    paths:
      - package.json
  workflow_dispatch: {}

permissions:
  contents: write       # tag + release
  id-token: write       # npm provenance attestation
  packages: write       # publish

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0     # need full history so we can detect whether
                             # this commit actually bumped the version,
                             # not just any change to package.json.

      - name: Read version from package.json
        id: version
        run: |
          set -euo pipefail
          v=$(node -p "require('./package.json').version")
          echo "version=${v}" >> "$GITHUB_OUTPUT"
          echo "tag=v${v}" >> "$GITHUB_OUTPUT"
          echo "Detected version: ${v}"

      - name: Skip if tag already exists
        id: gate
        env:
          TAG: ${{ steps.version.outputs.tag }}
        run: |
          set -euo pipefail
          if git rev-parse "$TAG" >/dev/null 2>&1; then
            echo "Tag $TAG already exists; nothing to do."
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Skip if version field didn't change in this push
        # Guard against package.json edits that touch metadata (keywords,
        # description, deps) without bumping version. We compare the
        # version at HEAD to the version at HEAD~1; if equal, no release.
        id: bumped
        if: steps.gate.outputs.skip != 'true'
        env:
          NEW: ${{ steps.version.outputs.version }}
        run: |
          set -euo pipefail
          old=$(git show "HEAD~1:package.json" 2>/dev/null | node -e "
            let s = ''; process.stdin.on('data', d => s += d).on('end', () => {
              try { console.log(JSON.parse(s).version); } catch { console.log(''); }
            });
          " || echo "")
          echo "old=${old}"
          echo "new=${NEW}"
          if [ "$old" = "$NEW" ]; then
            echo "Version unchanged ($old → $NEW); skipping."
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "Version bumped: $old → $NEW"
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        if: steps.gate.outputs.skip != 'true' && steps.bumped.outputs.skip != 'true'
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'
          cache: npm

      - name: Install + build + test
        if: steps.gate.outputs.skip != 'true' && steps.bumped.outputs.skip != 'true'
        run: |
          set -euo pipefail
          npm ci
          npm run typecheck
          npm run build
          npm test
        env:
          # Tests don't make network calls but some async paths still
          # warn about a missing key. Provide a no-op value.
          ANTHROPIC_API_KEY: sk-test-not-used-in-offline-tests

      - name: Verify VERSION constant matches package.json
        if: steps.gate.outputs.skip != 'true' && steps.bumped.outputs.skip != 'true'
        env:
          EXPECTED: ${{ steps.version.outputs.version }}
        run: |
          set -euo pipefail
          actual=$(node dist/cli.js --version | sed -E 's/^arnie v//')
          if [ "$actual" != "$EXPECTED" ]; then
            echo "Version mismatch: package.json says $EXPECTED but arnie --version says $actual."
            echo "Bump src/cli.ts's VERSION constant to match before releasing."
            exit 1
          fi
          echo "Version constants in sync: $actual"

      - name: Create annotated tag
        if: steps.gate.outputs.skip != 'true' && steps.bumped.outputs.skip != 'true'
        env:
          TAG: ${{ steps.version.outputs.tag }}
        run: |
          set -euo pipefail
          git config user.name 'askalf'
          git config user.email 'support@askalf.org'
          git tag -a "$TAG" -m "$TAG"
          git push origin "$TAG"

      - name: Extract this version's CHANGELOG section
        if: steps.gate.outputs.skip != 'true' && steps.bumped.outputs.skip != 'true'
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          set -euo pipefail
          # Pull the section between `## [VERSION]` and the next `## [`
          # heading. Falls back to a placeholder if the heading isn't
          # present so the release still gets created.
          awk -v v="$VERSION" '
            $0 ~ "^## \\[" v "\\]" { found=1; next }
            found && $0 ~ "^## \\[" { exit }
            found { print }
          ' CHANGELOG.md > release-notes.md
          if [ ! -s release-notes.md ]; then
            echo "(No CHANGELOG section for v$VERSION — please update CHANGELOG.md.)" > release-notes.md
          fi

      - name: Create GitHub release
        if: steps.gate.outputs.skip != 'true' && steps.bumped.outputs.skip != 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ steps.version.outputs.tag }}
        run: |
          set -euo pipefail
          gh release create "$TAG" \
            --title "$TAG" \
            --notes-file release-notes.md \
            --verify-tag

      - name: Publish to npm
        if: steps.gate.outputs.skip != 'true' && steps.bumped.outputs.skip != 'true'
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm publish --provenance --access public
